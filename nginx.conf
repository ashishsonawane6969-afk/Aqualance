# ─────────────────────────────────────────────────────────────────────────────
# nginx configuration — Aqualence Ventures Production
# File: /etc/nginx/sites-available/aqualence
#
# SETUP:
#   1. Install nginx:    sudo apt install nginx
#   2. Install certbot:  sudo apt install certbot python3-certbot-nginx
#   3. Copy this file:   sudo cp nginx.conf /etc/nginx/sites-available/aqualence
#   4. Edit: replace 'yourdomain.com' with your real domain
#   5. Enable:           sudo ln -s /etc/nginx/sites-available/aqualence /etc/nginx/sites-enabled/
#   6. Get SSL cert:     sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#   7. Test config:      sudo nginx -t
#   8. Reload:           sudo systemctl reload nginx
#
# CREATE LOG DIRECTORY:
#   sudo mkdir -p /var/log/aqualence
#   sudo chown www-data:www-data /var/log/aqualence  (or your app user)
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL certificates (managed by certbot) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── SSL hardening ───────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:MozSSL:10m;
    ssl_session_tickets       off;

    # ── Security headers (A02:2025 — Security Misconfiguration) ────────────
    # HSTS: force HTTPS for 1 year, include subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking (belt-and-suspenders with Helmet's frameguard)
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy — restrict GPS/camera to same origin only
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://maps.googleapis.com https://nominatim.openstreetmap.org https://*.tile.openstreetmap.org; frame-src https://maps.google.com https://www.google.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/aqualence_access.log;
    error_log  /var/log/nginx/aqualence_error.log;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Proxy to Node.js (PM2 on port 5000) ────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Body size — allow up to 12mb for product image uploads (base64)
        client_max_body_size 12m;
    }

    # ── TWA / Play Store: digital asset links ──────────────────────────────
    # Required for Trusted Web Activity (TWA) Android app.
    # Replace the fingerprint with your actual APK signing key SHA-256.
    location /.well-known/assetlinks.json {
        default_type application/json;
        return 200 '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"com.yourcompany.aqualence","sha256_cert_fingerprints":["REPLACE_WITH_YOUR_APK_SHA256_FINGERPRINT"]}}]';
    }

    # ── Apple App Site Association (for iOS deep links if needed) ──────────
    location /.well-known/apple-app-site-association {
        default_type application/json;
        return 200 '{"applinks":{"details":[]}}';
    }
}
