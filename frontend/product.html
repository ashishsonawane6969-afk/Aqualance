<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="/manifest.json" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1565a8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Product — Aqualence Ventures</title>
  <link rel="stylesheet" href="/customer.css" />

  </head>
<body class="product-page">

<!-- TOP BAR -->
<header class="app-header" role="banner">
  <button type="button" onclick="history.length>1?history.back():(window.location.href='/index.html')"
     class="header-back" style="border:none;cursor:pointer;" aria-label="Go back">&#8592;</button>
  <span class="header-title" id="pdHeaderTitle">Product</span>
  <a href="/cart.html" class="header-action cart-btn" id="cartBtnTop" aria-label="Cart">
    &#128722;
    <span class="cart-count" id="cartCount" style="display:none" aria-live="polite">0</span>
  </a>
</header>

<!-- BREADCRUMB -->
<nav class="pd-breadcrumb" aria-label="Breadcrumb">
  <a href="/index.html">Home</a>
  <span aria-hidden="true">&#8250;</span>
  <a href="/index.html#products">Products</a>
  <span aria-hidden="true">&#8250;</span>
  <span id="pdBreadcrumbName" aria-current="page">Loading&#8230;</span>
</nav>

<!-- PRODUCT CONTENT (filled dynamically by product.js) -->
<main class="pd-main" id="pdWrap" role="main">
  <div class="loading-overlay" style="min-height:55vh">
    <div class="spinner"></div>
  </div>
</main>


<!-- BOTTOM NAV (mobile) -->
<nav class="bottom-nav" aria-label="Main navigation">
  <div class="bottom-nav-inner">
    <a href="/index.html" class="bnav-item">
      <span class="bnav-icon" aria-hidden="true">&#127968;</span><span>Home</span>
    </a>
    <a href="/index.html#products" class="bnav-item active">
      <span class="bnav-icon" aria-hidden="true">&#128717;</span><span>Products</span>
    </a>
    <a href="/cart.html" class="bnav-fab" aria-label="Cart">
      <div class="bnav-fab-btn" aria-hidden="true">&#128722;</div>
    </a>
    <a href="/checkout.html" class="bnav-item">
      <span class="bnav-icon" aria-hidden="true">&#128230;</span><span>Order</span>
    </a>
    <a href="tel:7378656656" class="bnav-item">
      <span class="bnav-icon" aria-hidden="true">&#128222;</span><span>Call</span>
    </a>
  </div>
</nav>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

<!-- app.js MUST load first: provides getCart, saveCart, updateCartBadge, showToast -->
<script src="/js/app.js"></script>
<script src="/js/product.js"></script>
<script src="/js/network.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
</body>
</html>
