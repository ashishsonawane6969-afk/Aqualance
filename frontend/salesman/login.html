<html lang="en">

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Salesman Login — Aqualence Ventures</title>
  <link rel="stylesheet" href="/salesman/css/salesman.css" />

<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div style="font-size:2.2rem; margin-bottom:6px;">💼</div>
      <div class="footer-brand" style="font-size:1.4rem">Aqualence Ventures</div>
      <div style="font-size:.78rem;color:var(--ink-soft);margin-top:3px">iKrish Field Sales Portal</div>
    </div>
    <div class="salesman-badge">🌿 Salesman / Field Executive</div>
    <div id="loginError" class="login-error hidden"></div>
    <form id="salesmanLoginForm" novalidate>
      <div class="form-group">
        <label for="phone">Phone Number
          <input type="tel" id="phone" placeholder="Enter your phone number" maxlength="10" required autocomplete="username" inputmode="numeric" pattern="[0-9]*" oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
        </label>
      </div>
      <div class="form-group">
        <label for="password">Password
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
        Login to Field App
      </button>
    </form>
    
      
    </div>
  </div>
</div>
<script src="/js/network.js"></script>
<script src="/salesman/js/salesman.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
  <!-- Vercel Speed Insights -->
  <script defer src="/js/speed-insights-init.js"></script>

</body>
</html>
