<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="/manifest.json" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Change Password — Aqualence Delivery</title>
  <link rel="stylesheet" href="/delivery/css/delivery.css" />

  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
    .cp-card {
      background:var(--surface); border-radius:var(--r-lg); padding:36px 32px;
      width:min(420px,calc(100vw - 32px));
      box-shadow:var(--sh-md);
    }
    .cp-icon  { font-size:2.2rem; text-align:center; margin-bottom:8px; }
    .cp-title { font-family:var(--font-head); font-size:1.35rem; font-weight:700;
                color:var(--ink); text-align:center; margin-bottom:4px; }
    .cp-sub   { color:var(--ink-soft); font-size:.82rem; text-align:center; margin-bottom:24px; }
    .field    { margin-bottom:16px; }
    .field label { display:block; font-size:.78rem; font-weight:600; color:var(--ink-mid);
                   margin-bottom:5px; }
    .field input { width:100%; padding:11px 13px; border:1.5px solid var(--border);
                   border-radius:var(--r-sm); font-size:.88rem; font-family:var(--font-body);
                   outline:none; transition:border-color .15s; background:var(--surface-2); }
    .field input:focus { border-color:var(--brand); }
    .btn-primary { width:100%; padding:12px; background:var(--brand); color:#fff;
                   border:none; border-radius:var(--r-sm); font-size:.9rem; font-weight:700;
                   cursor:pointer; transition:background .15s; margin-top:4px; }
    .btn-primary:hover    { background:var(--brand-mid); }
    .btn-primary:disabled { background:var(--border-dark); cursor:not-allowed; }
    .alert { padding:10px 14px; border-radius:var(--r-sm); font-size:.82rem;
             margin-bottom:16px; display:none; }
    .alert.error   { background:var(--error-pale);   color:var(--error); }
    .alert.success { background:var(--success-pale); color:var(--success); }
  </style>
</head>
<body>
  <div class="cp-card">
    <div class="cp-icon">🔑</div>
    <div class="cp-title">Change Your Password</div>
    <div class="cp-sub">Your admin has set a temporary password.<br>Please create a new one to continue.</div>
    <div id="cpError"   class="alert error"></div>
    <div id="cpSuccess" class="alert success"></div>
    <form id="cpForm" novalidate>
      <div class="field">
        <label for="current_password">Current (Temporary) Password
          <input type="password" id="current_password" required autocomplete="current-password" />
        </label>
      </div>
      <div class="field">
        <label for="new_password">New Password (min 8 characters)
          <input type="password" id="new_password" required minlength="8" autocomplete="new-password" />
        </label>
      </div>
      <div class="field">
        <label for="confirm_password">Confirm New Password
          <input type="password" id="confirm_password" required autocomplete="new-password" />
        </label>
      </div>
      <button type="submit" id="cpBtn" class="btn-primary">Update Password</button>
    </form>
  </div>
  <script nonce="CSP_NONCE">
    document.getElementById('cpForm').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('cpError');
      const okEl  = document.getElementById('cpSuccess');
      const btn   = document.getElementById('cpBtn');
      errEl.style.display = 'none';
      okEl.style.display  = 'none';

      const cur  = document.getElementById('current_password').value;
      const nw   = document.getElementById('new_password').value;
      const conf = document.getElementById('confirm_password').value;

      if (nw !== conf) {
        errEl.textContent = 'New passwords do not match.';
        errEl.style.display = 'block';
        return;
      }
      if (nw.length < 8) {
        errEl.textContent = 'New password must be at least 8 characters.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Updating…'; btn.disabled = true;
      try {
        const res  = await fetch('/api/v1/auth/change-password', {
          method:      'POST',
          credentials: 'include',
          headers:     { 'Content-Type': 'application/json' },
          body:        JSON.stringify({ current_password: cur, new_password: nw }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
        okEl.textContent = 'Password updated! Redirecting…';
        okEl.style.display = 'block';
        setTimeout(() => { window.location.href = '/delivery/dashboard.html'; }, 1500);
      } catch (err) {
        errEl.textContent = err.message || 'Something went wrong. Please try again.';
        errEl.style.display = 'block';
        btn.textContent = 'Update Password'; btn.disabled = false;
      }
    });
  </script>

<!-- Vercel Speed Insights -->
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>

<script nonce="CSP_NONCE" src="/js/network.js"></script>

<script nonce="CSP_NONCE">
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
</body>
</html>
