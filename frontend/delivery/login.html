<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="/manifest.json" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1565a8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Delivery Login — Aqualence Ventures</title>
  <link rel="stylesheet" href="/delivery/css/delivery.css" />

  <style>html,body{overflow-x:hidden;max-width:100%;}*,*::before,*::after{box-sizing:border-box;}img,iframe,canvas{max-width:100%;height:auto;}select{max-width:100%;}.filter-bar,.controls-bar,.filter-row{flex-wrap:wrap;}@media(max-width:767px){select{font-size:16px;}}</style></head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="l-icon">🚴</div>
      <div class="brand">Aqualence Ventures</div>
      <div class="sub">Delivery Partner Portal</div>
    </div>
    <div class="login-title">Delivery Login</div>
    <div id="loginError" class="login-error hidden"></div>
    <form id="deliveryLoginForm" novalidate>
      <div class="form-group">
        <label for="phone">Phone Number
          <input type="tel" id="phone" placeholder="Enter your phone number" maxlength="10" required autocomplete="username" inputmode="numeric" pattern="[0-9]*" oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
        </label>
      </div>
      <div class="form-group">
        <label for="password">Password
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Login</button>
    </form>
    
    </div>
  </div>
</div>
<script src="/js/network.js"></script>
<script src="/delivery/js/delivery.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
  <!-- Vercel Speed Insights -->
  <script defer src="/js/speed-insights-init.js"></script>

</body>
</html>
