<script>
(function(){
  var k='aqualance_theme',d=document.documentElement;
  var s;try{s=localStorage.getItem(k);}catch(e){}
  if(!s)s=(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light';
  d.setAttribute('data-theme',s);
  // Update theme-color meta for mobile browser chrome
  var m=document.querySelector('meta[name="theme-color"]');
  if(m)m.setAttribute('content',s==='dark'?'#060d14':'#1565a8');
})();
</script>

<style id="dm-master">
/* ═══ MASTER DARK MODE ═══════════════════════════════════════ */

/* Base */
[data-theme="dark"] body { background:var(--bg)!important; color:var(--ink)!important; }
[data-theme="dark"] * { box-sizing:border-box; }

/* Universal white/light bg catchers */
[data-theme="dark"] [style*="background:#fff"],
[data-theme="dark"] [style*="background: #fff"],
[data-theme="dark"] [style*="background:white"],
[data-theme="dark"] [style*="background: white"],
[data-theme="dark"] [style*="background:#ffffff"],
[data-theme="dark"] [style*="background: #ffffff"],
[data-theme="dark"] [style*="background-color:#fff"],
[data-theme="dark"] [style*="background-color: #fff"],
[data-theme="dark"] [style*="background-color:white"],
[data-theme="dark"] [style*="background-color: white"],
[data-theme="dark"] [style*="background-color:#ffffff"],
[data-theme="dark"] [style*="background-color: #ffffff"],
[data-theme="dark"] [style*="background:#f"],
[data-theme="dark"] [style*="background: #f"],
[data-theme="dark"] [style*="background:#e"],
[data-theme="dark"] [style*="background: #e"],
[data-theme="dark"] [style*="background-color:#f"],
[data-theme="dark"] [style*="background-color: #f"] {
  background-color:var(--surface)!important;
  background:var(--surface)!important;
}

/* Card-like elements */
[data-theme="dark"] .card,
[data-theme="dark"] [class*="card"]:not([class*="bottom-nav"]):not([class*="topnav"]),
[data-theme="dark"] [class*="Card"],
[data-theme="dark"] [class*="-box"],
[data-theme="dark"] [class*="panel"]:not(.geo-map-panel),
[data-theme="dark"] [class*="tile"]:not([class*="map"]),
[data-theme="dark"] [class*="Tile"],
[data-theme="dark"] [class*="modal"],
[data-theme="dark"] [class*="Modal"],
[data-theme="dark"] [class*="sheet"],
[data-theme="dark"] [class*="popup"],
[data-theme="dark"] [class*="drawer"],
[data-theme="dark"] .tcard, [data-theme="dark"] .twrap,
[data-theme="dark"] .filter-section, [data-theme="dark"] .controls-bar,
[data-theme="dark"] .search-pill,
[data-theme="dark"] .report-card, [data-theme="dark"] .chart-card,
[data-theme="dark"] .kpi-card, [data-theme="dark"] .stat-card,
[data-theme="dark"] .info-card, [data-theme="dark"] .hours-card,
[data-theme="dark"] .form-card, [data-theme="dark"] .map-card,
[data-theme="dark"] .whatsapp-card,
[data-theme="dark"] .contact-hero,
[data-theme="dark"] .geo-panel, [data-theme="dark"] .assign-panel,
[data-theme="dark"] .detail-sheet, [data-theme="dark"] .p-tabs,
[data-theme="dark"] .podium-card, [data-theme="dark"] .lb-card,
[data-theme="dark"] .perf-card, [data-theme="dark"] .sm-card,
[data-theme="dark"] .lead-card, [data-theme="dark"] .lead-row,
[data-theme="dark"] .ps-table-wrap, [data-theme="dark"] #psTableWrap,
[data-theme="dark"] .modal-body, [data-theme="dark"] .modal-header,
[data-theme="dark"] .va-row, [data-theme="dark"] .va-bundle-inner,
[data-theme="dark"] .img-slot {
  background:var(--surface)!important;
  border-color:var(--border)!important;
  color:var(--ink)!important;
}

/* Page layout */
[data-theme="dark"] .main-area,
[data-theme="dark"] .content-area,
[data-theme="dark"] .app-layout,
[data-theme="dark"] .page-wrap,
[data-theme="dark"] .page-content,
[data-theme="dark"] .app-content,
[data-theme="dark"] .tab-panel {
  background:var(--bg)!important;
}

/* Admin sidebar always dark */
[data-theme="dark"] .sidebar { background:#060d14!important; border-color:#1e3a55!important; }
[data-theme="dark"] .topnav { background:var(--surface)!important; border-color:var(--border)!important; }
[data-theme="dark"] .app-header { background:var(--surface)!important; border-color:var(--border)!important; }

/* Tables */
[data-theme="dark"] table { background:transparent!important; }
[data-theme="dark"] thead tr,
[data-theme="dark"] thead th { background:var(--surface-2)!important; color:var(--ink-soft)!important; border-color:var(--border)!important; }
[data-theme="dark"] tbody td { color:var(--ink)!important; border-color:var(--border)!important; }
[data-theme="dark"] tbody tr:hover td { background:var(--surface-2)!important; }

/* Form controls */
[data-theme="dark"] input:not([type=checkbox]):not([type=radio]):not([type=range]):not([type=file]):not([type=submit]):not([type=button]),
[data-theme="dark"] select,
[data-theme="dark"] textarea {
  background:var(--surface-2)!important;
  border-color:var(--border)!important;
  color:var(--ink)!important;
}
[data-theme="dark"] input::placeholder,
[data-theme="dark"] textarea::placeholder { color:var(--ink-faint)!important; }

/* Buttons */
[data-theme="dark"] .btn-ghost { background:var(--surface-2)!important; color:var(--ink)!important; }
[data-theme="dark"] .btn-outline { border-color:var(--brand)!important; color:var(--brand)!important; background:transparent!important; }

/* Geo-map specific */
[data-theme="dark"] .geo-panel,
[data-theme="dark"] .p-tabs { background:var(--surface)!important; }
[data-theme="dark"] .p-tab { color:var(--ink-soft)!important; }
[data-theme="dark"] .p-tab.active { background:var(--surface)!important; color:var(--brand)!important; border-color:var(--brand)!important; }
[data-theme="dark"] .filter-bar select,
[data-theme="dark"] .filter-bar input,
[data-theme="dark"] .at-grid input,
[data-theme="dark"] .btn-clear,
[data-theme="dark"] .btn-focus,
[data-theme="dark"] #atDistrict,
[data-theme="dark"] #atTalukaSelect { background:var(--surface-2)!important; border-color:var(--border)!important; color:var(--ink)!important; }
[data-theme="dark"] .detail-sheet { background:var(--surface)!important; }

/* Contact page */
[data-theme="dark"] .contact-hero { background:linear-gradient(135deg,#060d14 0%,#0d2a45 100%)!important; }
[data-theme="dark"] .whatsapp-card { background:#0d2a1a!important; border-color:#1a5c2a!important; }
[data-theme="dark"] .whatsapp-card .wa-text h3 { color:#34d058!important; }
[data-theme="dark"] .whatsapp-card .wa-text p { color:#34d058!important; opacity:.8; }
[data-theme="dark"] .quick-call { background:var(--brand)!important; }

/* Overview chart area */
[data-theme="dark"] canvas { filter:brightness(.9); }
[data-theme="dark"] .chart-wrap,
[data-theme="dark"] [id*="chart"],
[data-theme="dark"] [id*="Chart"] { background:var(--surface)!important; }

/* Border overrides - inline styles */
[data-theme="dark"] [style*="border:1px solid #"],
[data-theme="dark"] [style*="border: 1px solid #"],
[data-theme="dark"] [style*="border:1.5px solid #"],
[data-theme="dark"] [style*="border: 1.5px solid #"],
[data-theme="dark"] [style*="border-bottom:1px solid"],
[data-theme="dark"] [style*="border-top:1px solid"],
[data-theme="dark"] [style*="border-color:#"] { border-color:var(--border)!important; }

/* Text color overrides - inline dark text on light bg */
[data-theme="dark"] [style*="color:#0"],
[data-theme="dark"] [style*="color: #0"],
[data-theme="dark"] [style*="color:#1"],
[data-theme="dark"] [style*="color: #1"],
[data-theme="dark"] [style*="color:#2"],
[data-theme="dark"] [style*="color: #2"],
[data-theme="dark"] [style*="color:#3"],
[data-theme="dark"] [style*="color: #3"],
[data-theme="dark"] [style*="color:black"],
[data-theme="dark"] [style*="color: black"] { color:var(--ink)!important; }

/* Soft text */
[data-theme="dark"] [style*="color:#6"],
[data-theme="dark"] [style*="color: #6"],
[data-theme="dark"] [style*="color:#7"],
[data-theme="dark"] [style*="color: #7"],
[data-theme="dark"] [style*="color:#8"],
[data-theme="dark"] [style*="color: #8"],
[data-theme="dark"] [style*="color:#9"],
[data-theme="dark"] [style*="color: #9"] { color:var(--ink-soft)!important; }

/* Product page variant chips */
[data-theme="dark"] .pd-variant-chip {
  background:var(--surface-2)!important;
  border-color:var(--border)!important;
  color:var(--ink)!important;
}
[data-theme="dark"] .pd-variant-chip.active {
  background:var(--ink)!important;
  color:#fff!important;
}

/* Salesman dashboard stat tiles */
[data-theme="dark"] [class*="kpi"],
[data-theme="dark"] [class*="stat"] { background:var(--surface)!important; border-color:var(--border)!important; }

/* Scrollbar */
[data-theme="dark"] * {
  scrollbar-color: var(--border) var(--surface-2);
}
</style>
<script id="dm-runtime">
(function(){
  var BG_LIGHT = /^(#fff(fff)?|white|#f[0-9a-f]{5}|#e[0-9a-f]{5}|rgb\(25[0-5],\s*25[0-5],\s*25[0-5]\))$/i;
  var BRD = /^(#[cde][0-9a-f]{5})$/i;
  var INK_DARK = /^(#[0-3][0-9a-f]{5}|black|rgb\([01]\d{0,2},)$/i;

  function patch(el){
    var s=el.style;
    if(!s) return;
    var bg=s.backgroundColor||s.background;
    if(bg && (BG_LIGHT.test(bg.trim())||bg==='rgb(255, 255, 255)'))
      el.style.setProperty('background-color','var(--surface)','important');
    if(s.borderColor && BRD.test(s.borderColor))
      el.style.setProperty('border-color','var(--border)','important');
    if(s.color && INK_DARK.test(s.color.trim()))
      el.style.setProperty('color','var(--ink)','important');
  }

  function patchAll(){
    if(document.documentElement.getAttribute('data-theme')!=='dark') return;
    document.querySelectorAll('[style]').forEach(patch);
  }

  new MutationObserver(function(ms){
    ms.forEach(function(m){
      if(m.attributeName==='data-theme') setTimeout(patchAll,50);
    });
  }).observe(document.documentElement,{attributes:true});

  document.addEventListener('DOMContentLoaded',function(){
    patchAll();
    new MutationObserver(function(){
      if(document.documentElement.getAttribute('data-theme')==='dark') patchAll();
    }).observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['style']});
  });
})();
</script>
