<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="/manifest.json" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1565a8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Your Cart — Aqualence Ventures</title>
  <link rel="stylesheet" href="/customer.css" />

  </head>
<body>

<!-- TOP BAR -->
<header class="app-header">
  <a href="/index.html" class="header-back">←</a>
  <span class="header-title">🛒 Your Cart</span>
  <a href="/index.html" class="header-action" title="Shop">🏠</a>
</header>

<!-- CART CONTENT -->
<main id="cartLayout" style="padding-bottom:calc(var(--bottom-nav-h) + 80px)">
  <div class="loading-overlay"><div class="spinner"></div></div>
</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/index.html" class="bnav-item">
      <span class="bnav-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="/index.html" class="bnav-item">
      <span class="bnav-icon">🛍️</span>
      <span>Products</span>
    </a>
    <a href="/cart.html" class="bnav-fab">
      <div class="bnav-fab-btn">🛒</div>
    </a>
    <a href="/checkout.html" class="bnav-item">
      <span class="bnav-icon">📦</span>
      <span>Order</span>
    </a>
    <a href="tel:7378656656" class="bnav-item">
      <span class="bnav-icon">📞</span>
      <span>Call</span>
    </a>
  </div>
</nav>

<div class="toast-container" id="toastContainer"></div>
<script src="/js/app.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/network.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
</body>
</html>
