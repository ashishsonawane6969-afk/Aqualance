        Leaderboard

    <div class="sidebar-footer">
      <button onclick="adminLogout()" class="btn btn-outline btn-sm btn-full" style="border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.7)">Logout</button>

  <div class="main-area">
    <div class="topnav">
      <button class="mob-menu-btn" id="mobMenuBtn" onclick="toggleSidebar()" aria-label="Open menu" aria-expanded="false">☰</button>
      <h2>📋 Orders Management</h2>
    </div>
    <div class="content-area">
      <div class="card">
        <div class="card-header">
          <div class="filter-bar">
            <input type="text" class="search-input" id="searchOrders" placeholder="🔍 Search orders..." />
            <select class="filter-select" id="statusFilter" onchange="loadOrders()">
              <option value="all">All Status</option>
              <option value="pending">Pending</option>
              <option value="assigned">Assigned</option>
              <option value="out_for_delivery">Out for Delivery</option>
              <option value="delivered">Delivered</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div class="card-body">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Order #</th>
                  <th>Shop</th>
                  <th>Phone</th>
                  <th>City</th>
                  <th>Amount</th>
                  <th>Delivery Boy</th>
                  <th>Status</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="ordersTableBody">
                <tr><td colspan="9" class="text-center" style="padding:40px"><div class="spinner"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="orderModal">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <h3>📦 Order Details</h3>
      <button class="modal-close" onclick="closeModal('orderModal')">✕</button>
    </div>
    <br>
    <div id="orderDetailContent" style="padding:0 18px;">Loading…</div>
    <div style="margin-top:18px; padding:0 18px; display:flex; gap:10px; flex-wrap:wrap;">
      <select id="assignDeliverySelect" class="filter-select" style="flex:1"></select>
      <button class="btn btn-primary btn-sm" onclick="assignDelivery()">Assign Delivery</button>
    </div>
    <div style="margin-top:12px; padding:0 18px; display:flex; gap:10px; flex-wrap:wrap;">
      <select id="updateStatusSelect" class="filter-select" style="flex:1">
        <option value="pending">Pending</option>
        <option value="assigned">Assigned</option>
        <option value="out_for_delivery">Out for Delivery</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <button class="btn btn-gold btn-sm" onclick="updateOrderStatus()">Update Status</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script nonce="CSP_NONCE" src="/js/network.js"></script>
<script nonce="CSP_NONCE" src="/admin/js/admin.js"></script>

<!-- SIDEBAR OVERLAY -->
<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ADMIN BOTTOM NAV (mobile) -->
<nav id="adminBottomNav">
  <div class="bottom-nav-inner">
    <a href="/admin/dashboard.html" class="bnav-item"><span class="bnav-icon">📊</span><span>Dash</span></a>
    <a href="/admin/overview.html" class="bnav-item"><span class="bnav-icon">📈</span><span>Overview</span></a>
    <a href="/admin/orders.html" class="bnav-item"><span class="bnav-icon">📋</span><span>Orders</span></a>
    <a href="/admin/products.html" class="bnav-item"><span class="bnav-icon">📦</span><span>Products</span></a>
    <a href="/admin/salesmen.html" class="bnav-item"><span class="bnav-icon">💼</span><span>Sales</span></a>
  </div>
</nav>
<script nonce="CSP_NONCE">
function toggleSidebar(){
  var s=document.getElementById("sidebar"),o=document.getElementById("sidebarOverlay");
  var isOpen=s.classList.toggle("open");
  o.classList.toggle("show",isOpen);
  document.body.style.overflow=isOpen?"hidden":"";
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("show");
  document.body.style.overflow="";
}
(function(){
  // Close sidebar on Escape key
  document.addEventListener("keydown",function(e){if(e.key==="Escape")closeSidebar();});
  // Mark active bottom nav item
  var path=window.location.pathname.split("/").pop();
  document.querySelectorAll("#adminBottomNav .bnav-item").forEach(function(a){
    if(a.getAttribute("href")===path)a.classList.add("active");
  });
  // Mark active sidebar item
  document.querySelectorAll(".sidebar .nav-item").forEach(function(a){
    if(a.getAttribute("href")===path)a.classList.add("active");
    else a.classList.remove("active");
  });
})();
</script>


<script nonce="CSP_NONCE">
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
</body>
</html>
