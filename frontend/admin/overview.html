<script>
(function(){
  var k='aqualance_theme',d=document.documentElement;
  var s;try{s=localStorage.getItem(k);}catch(e){}
  if(!s)s=(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light';
  d.setAttribute('data-theme',s);
  // Update theme-color meta for mobile browser chrome
  var m=document.querySelector('meta[name="theme-color"]');
  if(m)m.setAttribute('content',s==='dark'?'#060d14':'#1565a8');
})();
</script>

  <style>
    /* ── Overview-specific styles ───────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 20px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: var(--transition);
    }
    .kpi-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
    }
    .kpi-card.green::before  { background: var(--success); }
    .kpi-card.gold::before   { background: var(--gold); }
    .kpi-card.blue::before   { background: #1976d2; }
    .kpi-card.purple::before { background: #7b1fa2; }
    .kpi-card.red::before    { background: var(--error); }
    .kpi-card.sage::before   { background: var(--sage); }
    .kpi-label {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--ink-soft); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .kpi-value {
      font-size: 2rem; font-weight: 700; color: var(--ink); line-height: 1;
    }
    .kpi-sub {
      font-size: .75rem; color: var(--ink-soft); margin-top: 6px;
    }
    .kpi-trend {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: .72rem; font-weight: 700; padding: 2px 8px;
      border-radius: 10px; margin-top: 6px;
    }
    .kpi-trend.up   { background:var(--surface-2); color: #2e7d32; }
    .kpi-trend.down { background: #fce4ec; color: #c62828; }
    .kpi-trend.neu  { background: #f5f5f5; color: var(--ink-soft); }

    /* Charts grid */
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    .charts-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    .chart-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .chart-header {
      padding: 16px 20px 8px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .chart-title { font-size: .9rem; font-weight: 700; color: var(--ink); }
    .chart-subtitle { font-size: .75rem; color: var(--ink-soft); margin-top: 1px; }
    .chart-body { padding: 16px 20px 20px; }
    canvas { max-width: 100%; }

    /* Period toggle */
    .period-toggle {
      display: flex; border: 1.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden;
    }
    .period-btn {
      padding: 5px 12px; font-size: .75rem; font-weight: 600; border: none;
      background: none; color: var(--ink-soft); cursor: pointer; transition: var(--transition);
    }
    .period-btn.active { background: var(--sage); color: #fff; }

    /* Horizontal bar */
    .hbar-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .hbar-label { width: 160px; font-size: .8rem; color: var(--ink-mid); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hbar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .hbar-fill  { height: 100%; border-radius: 4px; transition: width .6s cubic-bezier(.4,0,.2,1); }
    .hbar-val   { width: 50px; text-align: right; font-size: .78rem; font-weight: 700; color: var(--ink); }

    /* City table */
    .city-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
    .city-row:last-child { border-bottom: none; }
    .city-rank { width: 24px; height: 24px; border-radius: 50%; background: var(--sage-pale); color: var(--sage); font-weight: 700; font-size: .75rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .city-name { flex: 1; font-weight: 600; }

    @media (max-width: 1000px) {
      .charts-grid   { grid-template-columns: 1fr; }
      .charts-grid-3 { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) { .kpi-grid { grid-template-columns: repeat(2,1fr); } }

    /* ── Overflow & layout containment fixes ── */
    .main-area { min-width: 0; overflow-x: hidden; }
    .content-area { min-width: 0; overflow-x: hidden; max-width: 100%; }
    .kpi-grid { min-width: 0; }
    .charts-grid, .charts-grid-3 { min-width: 0; }
    .chart-card { min-width: 0; }
    canvas { display: block; max-width: 100% !important; }
    @media (max-width: 899px) {
      .charts-grid   { grid-template-columns: 1fr !important; }
      .charts-grid-3 { grid-template-columns: 1fr !important; }
      .kpi-grid { grid-template-columns: repeat(2,1fr); }
      .hbar-label { width: 110px; }
    }
  </style>

<script id="dm-runtime">
(function(){
  var BG_LIGHT = /^(#fff(fff)?|white|#f[0-9a-f]{5}|#e[0-9a-f]{5}|rgb\(25[0-5],\s*25[0-5],\s*25[0-5]\))$/i;
  var BRD = /^(#[cde][0-9a-f]{5})$/i;
  var INK_DARK = /^(#[0-3][0-9a-f]{5}|black|rgb\([01]\d{0,2},)$/i;

  function patch(el){
    var s=el.style;
    if(!s) return;
    var bg=s.backgroundColor||s.background;
    if(bg && (BG_LIGHT.test(bg.trim())||bg==='rgb(255, 255, 255)'))
      el.style.setProperty('background-color','var(--surface)','important');
    if(s.borderColor && BRD.test(s.borderColor))
      el.style.setProperty('border-color','var(--border)','important');
    if(s.color && INK_DARK.test(s.color.trim()))
      el.style.setProperty('color','var(--ink)','important');
  }

  function patchAll(){
    if(document.documentElement.getAttribute('data-theme')!=='dark') return;
    document.querySelectorAll('[style]').forEach(patch);
  }

  new MutationObserver(function(ms){
    ms.forEach(function(m){
      if(m.attributeName==='data-theme') setTimeout(patchAll,50);
    });
  }).observe(document.documentElement,{attributes:true});

  document.addEventListener('DOMContentLoaded',function(){
    patchAll();
    new MutationObserver(function(){
      if(document.documentElement.getAttribute('data-theme')==='dark') patchAll();
    }).observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['style']});
  });
})();
</script>

      const _orig = Storage.prototype.setItem;
      Storage.prototype.setItem = function(k, v) {
        try { _orig.call(this, k, v); } catch(e) {}
      };
    }
  }
} catch(e) {}
</script>

<script src="/admin/js/admin.js"></script>
<script>
/* ── Overview Page Logic ─────────────────────────────────── */
let charts = {};
let overviewData = null;
let chartPeriod = '14';

function destroyCharts() {
  Object.values(charts).forEach(c => c?.destroy());
  charts = {};
}

function fmtINR(v) { return '₹' + parseFloat(v || 0).toLocaleString('en-IN', {maximumFractionDigits:0}); }
function fmtNum(v) { return parseInt(v || 0).toLocaleString('en-IN'); }

async function loadOverview() {
  try {
    const res  = await apiFetch('/api/v1/orders/overview');
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    overviewData = json.data;
    renderOverview();
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-IN');
  } catch (err) {
    showToast('Failed to load overview: ' + err.message, 'error');
  }
}

function renderOverview() {
  destroyCharts();
  const d = overviewData;
  const t = d.totals;

  document.getElementById('overviewContent').innerHTML = `
    <!-- ── KPI Row 1: Snapshot ──────────────────────── -->
    <div class="kpi-grid">
      <div class="kpi-card sage">
        <div class="kpi-label">📋 Total Orders</div>
        <div class="kpi-value">${fmtNum(t.total_orders)}</div>
        <div class="kpi-sub">All time</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">✅ Delivered</div>
        <div class="kpi-value">${fmtNum(t.delivered)}</div>
        <div class="kpi-sub">${t.total_orders > 0 ? Math.round(t.delivered*100/t.total_orders) : 0}% completion rate</div>
      </div>
      <div class="kpi-card gold">
        <div class="kpi-label">💰 Total Revenue</div>
        <div class="kpi-value" style="font-size:1.5rem">${fmtINR(t.total_revenue)}</div>
        <div class="kpi-sub">From delivered orders</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">📦 Avg Order Value</div>
        <div class="kpi-value" style="font-size:1.5rem">${fmtINR(t.avg_order_value)}</div>
        <div class="kpi-sub">Per delivered order</div>
      </div>
      <div class="kpi-card purple">
        <div class="kpi-label">⏳ Pending</div>
        <div class="kpi-value">${fmtNum(t.pending)}</div>
        <div class="kpi-sub">Awaiting assignment</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">🚴 In Transit</div>
        <div class="kpi-value">${fmtNum(parseInt(t.assigned||0) + parseInt(t.out_for_delivery||0))}</div>
        <div class="kpi-sub">Assigned + out for delivery</div>
      </div>
    </div>

    <!-- ── Today / This Week ────────────────────────── -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
      <div class="chart-card" style="background:linear-gradient(135deg,var(--sage) 0%,var(--sage-light) 100%);color:#fff;border:none;">
        <div style="padding:20px;">
          <div style="font-size:.8rem;opacity:.8;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">📅 Today</div>
          <div style="font-size:2.2rem;font-weight:700;line-height:1">${d.today.orders}</div>
          <div style="font-size:.85rem;opacity:.85;margin-top:4px">orders &nbsp;·&nbsp; ${fmtINR(d.today.revenue)} revenue</div>
        </div>
      </div>
      <div class="chart-card" style="background:linear-gradient(135deg,#c9a84c 0%,#e8c97a 100%);color:#fff;border:none;">
        <div style="padding:20px;">
          <div style="font-size:.8rem;opacity:.8;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">📆 This Week</div>
          <div style="font-size:2.2rem;font-weight:700;line-height:1">${d.thisWeek.orders}</div>
          <div style="font-size:.85rem;opacity:.85;margin-top:4px">orders &nbsp;·&nbsp; ${fmtINR(d.thisWeek.revenue)} revenue</div>
        </div>
      </div>
    </div>

    <!-- ── Orders Trend + Status Doughnut ──────────── -->
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-header">
          <div>
            <div class="chart-title">📈 Orders & Revenue Trend</div>
            <div class="chart-subtitle">Daily breakdown</div>
          </div>
          <div class="period-toggle">
            <button class="period-btn ${chartPeriod==='14'?'active':''}" onclick="switchPeriod('14')">14 Days</button>
            <button class="period-btn ${chartPeriod==='30'?'active':''}" onclick="switchPeriod('30')">30 Days</button>
          </div>
        </div>
        <div class="chart-body"><canvas id="trendChart" height="200"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div>
            <div class="chart-title">🍩 Order Status</div>
            <div class="chart-subtitle">All-time breakdown</div>
          </div>
        </div>
        <div class="chart-body" style="display:flex;flex-direction:column;align-items:center;">
          <canvas id="statusChart" height="200" style="max-width:220px"></canvas>
          <div id="statusLegend" style="margin-top:14px;width:100%"></div>
        </div>
      </div>
    </div>

    <!-- ── Top Products + City Breakdown ────────────── -->
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-header">
          <div>
            <div class="chart-title">🏆 Top Selling Products</div>
            <div class="chart-subtitle">By quantity delivered</div>
          </div>
        </div>
        <div class="chart-body" id="topProductsBody" style="padding:16px 20px"></div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div>
            <div class="chart-title">🗺️ Orders by City</div>
            <div class="chart-subtitle">Top delivery locations</div>
          </div>
        </div>
        <div class="chart-body" id="cityBody" style="padding:14px 20px"></div>
      </div>
    </div>
  `;

  buildTrendChart(chartPeriod === '30' ? d.monthlyOrders : d.dailyOrders);
  buildStatusChart(d.statusBreakdown);
  buildTopProducts(d.topProducts);
  buildCityTable(d.cityBreakdown);
}

function switchPeriod(p) {
  chartPeriod = p;
  if (!overviewData) return;
  // Update button states
  document.querySelectorAll('.period-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(p === '14' ? '14' : '30'));
  });
  charts.trend?.destroy();
  buildTrendChart(p === '30' ? overviewData.monthlyOrders : overviewData.dailyOrders);
}

/* Fill sparse date array with zeros */
function fillDates(data, days) {
  const result = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = d.toISOString().split('T')[0];
    const found = data.find(r => r.date?.startsWith(key));
    result.push({ date: key, orders: found ? parseInt(found.orders) : 0, revenue: found ? parseFloat(found.revenue) : 0 });
  }
  return result;
}

function buildTrendChart(rawData) {
  const days = chartPeriod === '30' ? 30 : 14;
  const data  = fillDates(rawData, days);
  const labels = data.map(d => {
    const dt = new Date(d.date + 'T00:00:00');
    return dt.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
  });

  const ctx = document.getElementById('trendChart')?.getContext('2d');
  if (!ctx) return;
  charts.trend = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Orders',
          data: data.map(d => d.orders),
          backgroundColor: 'rgba(90,122,92,0.7)',
          borderRadius: 4,
          yAxisID: 'y',
        },
        {
          label: 'Revenue (₹)',
          data: data.map(d => d.revenue),
          type: 'line',
          borderColor: '#c9a84c',
          backgroundColor: 'rgba(201,168,76,0.08)',
          pointBackgroundColor: '#c9a84c',
          pointRadius: 3,
          borderWidth: 2,
          tension: 0.4,
          fill: true,
          yAxisID: 'y1',
        },
      ],
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } },
        tooltip: {
          callbacks: {
            label: ctx => ctx.dataset.label === 'Revenue (₹)'
              ? ' ₹' + ctx.parsed.y.toLocaleString('en-IN')
              : ' ' + ctx.parsed.y + ' orders'
          }
        }
      },
      scales: {
        y:  { beginAtZero: true, ticks: { precision: 0, font: { size: 10 } }, grid: { color: '#f0f0f0' } },
        y1: { beginAtZero: true, position: 'right', grid: { drawOnChartArea: false },
               ticks: { callback: v => '₹' + (v >= 1000 ? (v/1000).toFixed(1)+'k' : v), font: { size: 10 } } },
        x:  { ticks: { maxRotation: 45, font: { size: 10 } }, grid: { display: false } },
      },
    },
  });
}

function buildStatusChart(status) {
  const ctx = document.getElementById('statusChart')?.getContext('2d');
  if (!ctx) return;
  const labels = ['Pending', 'Assigned', 'Out for Delivery', 'Delivered', 'Cancelled'];
  const values = [status.pending, status.assigned, status.out_for_delivery, status.delivered, status.cancelled];
  const colors = ['#f0a500', '#1976d2', '#7b1fa2', '#4caf7d', '#d9534f'];

  charts.status = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
    options: {
      responsive: true,
      cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed}` } } },
    },
  });

  // Custom legend
  const total = values.reduce((a,b) => a+b, 0);
  document.getElementById('statusLegend').innerHTML = labels.map((l, i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:.78rem;">
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="width:10px;height:10px;border-radius:50%;background:${colors[i]};flex-shrink:0"></span>
        <span>${l}</span>
      </div>
      <span style="font-weight:700">${values[i]} <span style="color:var(--ink-soft);font-weight:400">(${total>0?Math.round(values[i]*100/total):0}%)</span></span>
    </div>`).join('');
}

function buildTopProducts(products) {
  const el = document.getElementById('topProductsBody');
  if (!el) return;
  if (!products.length) { el.innerHTML = '<div class="empty-state" style="padding:20px"><p>No delivered orders yet</p></div>'; return; }
  const max = Math.max(...products.map(p => parseInt(p.total_qty)));
  const colors = ['#5a7a5c','#7a9e7c','#c9a84c','#e8c97a','#1976d2','#7b1fa2','#4caf7d','#d9534f'];
  el.innerHTML = products.map((p, i) => `
    <div class="hbar-row">
      <div class="hbar-label" title="${p.product_name}">${p.product_name}</div>
      <div class="hbar-track">
        <div class="hbar-fill" style="width:${Math.round(parseInt(p.total_qty)/max*100)}%;background:${colors[i%colors.length]}"></div>
      </div>
      <div class="hbar-val">${p.total_qty}</div>
    </div>`).join('');
}

function buildCityTable(cities) {
  const el = document.getElementById('cityBody');
  if (!el) return;
  if (!cities.length) { el.innerHTML = '<div class="empty-state" style="padding:20px"><p>No orders yet</p></div>'; return; }
  el.innerHTML = cities.map((c, i) => `
    <div class="city-row">
      <div class="city-rank">${i+1}</div>
      <div class="city-name">${c.city}</div>
      <div style="font-size:.8rem;color:var(--ink-soft)">${c.orders} orders</div>
      <div style="font-size:.8rem;font-weight:700;color:var(--sage)">${fmtINR(c.revenue)}</div>
    </div>`).join('');
}

(window.adminAuthRehydrate || Promise.resolve.bind(Promise, true))().then(function(ok) { if (ok) loadOverview(); });
</script>

<script>
function toggleSidebar(){
  var s=document.getElementById("sidebar"),o=document.getElementById("sidebarOverlay");
  var isOpen=s.classList.toggle("open");
  o.classList.toggle("show",isOpen);
  document.body.style.overflow=isOpen?"hidden":"";
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("show");
  document.body.style.overflow="";
}
(function(){
  // Close sidebar on Escape key
  document.addEventListener("keydown",function(e){if(e.key==="Escape")closeSidebar();});
  // Mark active bottom nav item
  var path=window.location.pathname.split("/").pop();
  document.querySelectorAll("#adminBottomNav .bnav-item").forEach(function(a){
    if(a.getAttribute("href")===path)a.classList.add("active");
  });
  // Mark active sidebar item
  document.querySelectorAll(".sidebar .nav-item").forEach(function(a){
    if(a.getAttribute("href")===path)a.classList.add("active");
    else a.classList.remove("active");
  });
})();
</script>
