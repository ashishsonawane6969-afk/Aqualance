(function(){
  var k='aqualance_theme',d=document.documentElement;
  var s;try{s=localStorage.getItem(k);}catch(e){}
  if(!s)s=(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light';
  d.setAttribute('data-theme',s);
  // Update theme-color meta for mobile browser chrome
  var m=document.querySelector('meta[name="theme-color"]');
  if(m)m.setAttribute('content',s==='dark'?'#060d14':'#1565a8');
})();

    body { background:var(--surface-2); }
    .main-area    { min-width: 0; overflow-x: hidden; flex: 1; width: 100%; }
    .content-area { padding: 12px; min-width: 0; overflow-x: hidden; width: 100%; box-sizing: border-box; }
    @media(min-width:900px){ .content-area{ padding: 20px 24px 32px; } }

    /* ── KPI TILES — full-width grid, override base style.css ── */
    .kpi-grid {
      display: grid !important;
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 10px !important;
      margin-bottom: 14px !important;
      width: 100% !important;
    }
    @media(min-width:600px) { .kpi-grid { grid-template-columns: repeat(4, 1fr) !important; } }
    @media(min-width:900px) { .kpi-grid { gap: 14px !important; grid-template-columns: repeat(4, 1fr) !important; } }

    .kpi-card {
      background:var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 15px 12px 13px;
      text-align: center;
      box-shadow: 0 1px 6px rgba(21,101,168,.05);
      position: relative;
      overflow: hidden;
    }
    .kpi-card::after {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }
    .kpi-card.sage::after   { background: var(--brand,#3a6b1c); }
    .kpi-card.green::after  { background: var(--success,#4caf7d); }
    .kpi-card.gold::after   { background: var(--gold,#c9a84c); }
    .kpi-card.blue::after   { background: #1565c0; }
    .kpi-card.purple::after { background: #7b1fa2; }
    .kpi-card.teal::after   { background: #00897b; }

    .kpi-icon  { font-size: 1.5rem; display: block; margin-bottom: 3px; }
    .kpi-value {
      font-size: 2rem; font-weight: 800; line-height: 1.05;
      display: block; font-variant-numeric: tabular-nums;
    }
    .kpi-card.sage   .kpi-value { color: var(--brand,#3a6b1c); }
    .kpi-card.green  .kpi-value { color: var(--success,#4caf7d); }
    .kpi-card.gold   .kpi-value { color: var(--gold,#c9a84c); }
    .kpi-card.blue   .kpi-value { color:var(--ink); }
    .kpi-card.purple .kpi-value { color: #7b1fa2; }
    .kpi-card.teal   .kpi-value { color: #00897b; }
    .kpi-value.rupee { font-size: clamp(1.3rem,5vw,1.9rem); }
    .kpi-label {
      font-size: .6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--ink-soft); margin-top: 3px; display: block;

      background:var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(21,101,168,.07);

      align-items: center;

<script id="dm-runtime">
(function(){
  var BG_LIGHT = /^(#fff(fff)?|white|#f[0-9a-f]{5}|#e[0-9a-f]{5}|rgb\(25[0-5],\s*25[0-5],\s*25[0-5]\))$/i;
  var BRD = /^(#[cde][0-9a-f]{5})$/i;
  var INK_DARK = /^(#[0-3][0-9a-f]{5}|black|rgb\([01]\d{0,2},)$/i;

  function patch(el){
    var s=el.style;
    if(!s) return;
    var bg=s.backgroundColor||s.background;
    if(bg && (BG_LIGHT.test(bg.trim())||bg==='rgb(255, 255, 255)'))
      el.style.setProperty('background-color','var(--surface)','important');
    if(s.borderColor && BRD.test(s.borderColor))
      el.style.setProperty('border-color','var(--border)','important');
    if(s.color && INK_DARK.test(s.color.trim()))
      el.style.setProperty('color','var(--ink)','important');
  }

  function patchAll(){
    if(document.documentElement.getAttribute('data-theme')!=='dark') return;
    document.querySelectorAll('[style]').forEach(patch);
  }

  new MutationObserver(function(ms){
    ms.forEach(function(m){
      if(m.attributeName==='data-theme') setTimeout(patchAll,50);
    });
  }).observe(document.documentElement,{attributes:true});

  document.addEventListener('DOMContentLoaded',function(){
    patchAll();
    new MutationObserver(function(){
      if(document.documentElement.getAttribute('data-theme')==='dark') patchAll();
    }).observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['style']});
  });
})();
</script>

<script>
/* ── Back-button-after-logout prevention ────────────────────────────────
 * After logout, browser may serve the dashboard from bfcache (back-forward cache).
 * The pageshow event fires with persisted=true in that case — we re-check auth
 * and redirect to login if the session is gone.
 * history.replaceState on the login redirect ensures this page is not in history.
 */
(function() {
  function isAuthenticated() {
    try { return !!sessionStorage.getItem('aq_admin_user'); } catch(_) { return false; }
  }
  window.addEventListener('pageshow', function(e) {
    if (e.persisted && !isAuthenticated()) {
      // Served from bfcache after logout — hard redirect to login
      window.location.replace('/admin/login.html');
    }
  });
  // Push a state so the back button hits this entry, not the login page
  if (window.history && window.history.replaceState) {
    window.history.replaceState({ page: 'admin-dashboard' }, '', window.location.href);
  }
})();
</script>

<script>
/* ── Sidebar ─────────────────────────────────────── */
function toggleSidebar(){
  var s=document.getElementById("sidebar"),o=document.getElementById("sidebarOverlay");
  var open=s.classList.toggle("open");
  o.classList.toggle("show",open);
  document.body.style.overflow=open?"hidden":"";
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("show");
  document.body.style.overflow="";
}
(function(){
  document.addEventListener("keydown",function(e){if(e.key==="Escape")closeSidebar();});
  var p=window.location.pathname.split("/").pop();
  document.querySelectorAll("#adminBottomNav .bnav-item").forEach(function(a){
    if(a.getAttribute("href")===p)a.classList.add("active");
  });
  document.querySelectorAll(".sidebar .nav-item").forEach(function(a){
    if(a.getAttribute("href")===p)a.classList.add("active");
    else a.classList.remove("active");
  });
})();

/* ── XSS guard ─────────────────────────────────── */
function _esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s!=null?String(s):''));return d.innerHTML;}

/* ── Helpers ─────────────────────────────────────── */
function fmtINR(v){ return '₹'+parseFloat(v||0).toLocaleString('en-IN',{maximumFractionDigits:0}); }
function fmtNum(v){ return parseInt(v||0).toLocaleString('en-IN'); }
function fmtDate(d){ return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'}); }
function badge(s){
  var colors={
    pending:'background:#fff3cd;color:#856404',
    assigned:'background:#cfe2ff;color:#084298',
    out_for_delivery:'background:#e8d5f7;color:#5a1088',
    delivered:'background:#d1e7dd;color:#0a3622',
    cancelled:'background:#f8d7da;color:#842029'
  };
  var st=s||'';
  var style=colors[st]||'background:#f5f5f5;color:#555';
  return '<span class="status" style="'+style+'">'+st.replace(/_/g,' ')+'</span>';
}

/* ── Load dashboard ──────────────────────────────── */
async function loadDashboard(){
  try {
    const [sRes, oRes] = await Promise.all([
      apiFetch('/api/v1/orders/stats'),
      apiFetch('/api/v1/orders')
    ]);
    const s = (await sRes.json()).data || {};
    const orders = (await oRes.json()).data || [];

    /* Today */
    var today = new Date().toISOString().slice(0,10);
    var todayOrders  = orders.filter(function(o){ return (o.created_at||'').slice(0,10)===today; });
    var todayRev     = todayOrders.reduce(function(a,o){ return a+parseFloat(o.total_price||0); },0);

    /* This week */
    var wk = new Date(); wk.setDate(wk.getDate()-wk.getDay());
    var wkOrders = orders.filter(function(o){ return new Date(o.created_at)>=wk; });
    var wkRev    = wkOrders.reduce(function(a,o){ return a+parseFloat(o.total_price||0); },0);

    /* Derived */
    var inTransit  = (parseInt(s.assigned)||0)+(parseInt(s.out_for_delivery)||0);
    var compRate   = s.total_orders>0 ? Math.round((s.delivered||0)*100/s.total_orders) : 0;
    var avgVal     = (s.delivered>0) ? Math.round(parseFloat(s.revenue||0)/parseInt(s.delivered)) : 0;

    /* Recent 10 orders */
    var recent = orders.slice(0,10);
    var rows = recent.length
      ? recent.map(function(o){
          return '<tr>'
            +'<td><strong style="color:var(--brand)">'+_esc(o.order_number)+'</strong></td>'
            +'<td>'+_esc(o.shop_name)+'</td>'
            +'<td>'+_esc(o.phone)+'</td>'
            +'<td>'+_esc(o.city)+'</td>'
            +'<td style="font-weight:600">'+fmtINR(o.total_price)+'</td>'
            +'<td>'+badge(_esc(o.status))+'</td>'
            +'<td style="color:var(--ink-soft)">'+fmtDate(o.created_at)+'</td>'
            +'</tr>';
        }).join('')
      : '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--ink-soft)">No orders yet</td></tr>';

    document.getElementById('dashContent').innerHTML =
      /* ── 7 KPI TILES (icon + big number + label) ── */
      '<div class="kpi-grid">'
        +'<div class="kpi-card sage">'
          +'<span class="kpi-icon">📋</span>'
          +'<span class="kpi-value">'+fmtNum(s.total_orders)+'</span>'
          +'<span class="kpi-label">Total Orders</span>'
        +'</div>'
        +'<div class="kpi-card purple">'
          +'<span class="kpi-icon">⏳</span>'
          +'<span class="kpi-value">'+fmtNum(s.pending)+'</span>'
          +'<span class="kpi-label">Pending</span>'
        +'</div>'
        +'<div class="kpi-card teal">'
          +'<span class="kpi-icon">🚴</span>'
          +'<span class="kpi-value">'+fmtNum(inTransit)+'</span>'
          +'<span class="kpi-label">Out for Delivery</span>'
        +'</div>'
        +'<div class="kpi-card green">'
          +'<span class="kpi-icon">✅</span>'
          +'<span class="kpi-value">'+fmtNum(s.delivered)+'</span>'
          +'<span class="kpi-label">Delivered</span>'
        +'</div>'
        +'<div class="kpi-card gold">'
          +'<span class="kpi-icon">💰</span>'
          +'<span class="kpi-value rupee">'+fmtINR(s.revenue)+'</span>'
          +'<span class="kpi-label">Revenue</span>'
        +'</div>'
        +'<div class="kpi-card blue">'
          +'<span class="kpi-icon">📦</span>'
          +'<span class="kpi-value">'+fmtNum(s.products)+'</span>'
          +'<span class="kpi-label">Products</span>'
        +'</div>'
        +'<div class="kpi-card sage">'
          +'<span class="kpi-icon">🚴</span>'
          +'<span class="kpi-value">'+fmtNum(s.delivery_boys)+'</span>'
          +'<span class="kpi-label">Delivery Boys</span>'
        +'</div>'
      +'</div>'

      /* ── RECENT ORDERS ── */
      +'<div class="section-card">'
        +'<div class="section-head">'
          +'<h3>📋 Recent Orders</h3>'
          +'<a href="/admin/orders.html" class="btn btn-outline btn-sm">View All</a>'
        +'</div>'
        +'<div class="table-wrap">'
          +'<table id="recentOrdersTable">'
            +'<thead><tr>'
              +'<th>Order #</th><th>Shop</th><th>Phone</th>'
              +'<th>City</th><th>Amount</th><th>Status</th><th>Date</th>'
            +'</tr></thead>'
            +'<tbody>'+rows+'</tbody>'
          +'</table>'
        +'</div>'
      +'</div>'

      +'<div class="btm-clear"></div>';

    document.getElementById('lastUpdated').textContent =
      'Updated '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});

  } catch(err){
    document.getElementById('dashContent').innerHTML =
      '<div style="text-align:center;padding:60px 20px;color:var(--error)">'
        +'<div style="font-size:2.5rem;margin-bottom:12px">⚠️</div>'
        +'<div style="font-weight:700;margin-bottom:8px">Failed to load dashboard</div>'
        +'<div style="font-size:.82rem;color:var(--ink-soft);margin-bottom:20px">'+err.message+'</div>'
        +'<button class="btn btn-primary" onclick="loadDashboard()">↻ Retry</button>'
      +'</div>';
    console.error('[dashboard]',err);
  }
}

loadDashboard();
</script>

<script>window.API_BASE = 'https://aqualance-production-9e22.up.railway.app';</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    var apiBase = window.API_BASE || '';
    navigator.serviceWorker.register('/sw.js?api_base=' + encodeURIComponent(apiBase))
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>

</body>
